<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVM DEMO</title>
    <style>/* ── Reset & base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --evm-blue:   #1a4b8c;
            --evm-blue2:  #2563a8;
            --btn-blue:   #1e5799;
            --red-light:  #c0392b;
            --red-active: #ff2222;
            --bg:         #f0f2f5;
            --card-bg:    #ffffff;
            --border:     #d0d4da;
            --text:       #1a1a2e;
            --teal:       #0d9488;
            --success:    #16a34a;
            --purple:     #7c3aed;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── EVM Machine wrapper ── */
        .evm-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .evm-machine {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.08);
            width: 100%;
            overflow: hidden;
        }

        .evm-header {
            color: var(--text);
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .evm-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: #f8f9fb;
        }

        .evm-status .status-label {
            font-weight: 600;
            font-size: .95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--red-light);
            transition: background .3s, box-shadow .3s;
        }
        .status-dot.ready {
            background: #22c55e;
            box-shadow: 0 0 8px #22c55e88;
        }
        .status-dot.blink {
            animation: blink 0.4s ease-in-out 4;
        }
        @keyframes blink {
            0%,100% { background: var(--red-light); box-shadow: none; }
            50%      { background: var(--red-active); box-shadow: 0 0 12px var(--red-active); }
        }

        .ballot-unit {
            font-weight: 600;
            font-size: .95rem;
        }

        /* ── Ballot rows ── */
        .ballot-list { width: 100%; border-collapse: collapse; }

        .ballot-list tr { border-bottom: 1px solid var(--border); }
        .ballot-list tr:last-child { border-bottom: none; }

        .ballot-list td { padding: 14px 10px; vertical-align: middle; }

        .col-num  { width: 40px; text-align: center; color: #555; font-weight: 700; font-size: 1.4rem; }
        .col-info { }
        .col-photo { width: 52px; }
        .col-symbol { width: 52px; }
        .col-led  { width: 36px; text-align: center; }
        .col-btn  { width: 80px; text-align: right; padding-right: 18px; }

        .candidate-name {
            font-size: 1 rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
        }

        /* candidate photo placeholder */
        .photo-avatar {
            width: 42px; height: 42px;
            border-radius: 4px;
            background: transparent;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .photo-avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* symbol icon */
        .symbol-icon {
            width: 36px; height: 36px;
            opacity: .75;
        }

        /* LED */
        .led {
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--red-light);
            border: 2px solid #8b1a1a;
            margin: 0 auto;
            transition: background .3s, box-shadow .3s;
        }
        .led.blink {
            animation: ledBlink 0.4s ease-in-out 4;
        }
        @keyframes ledBlink {
            0%,100% { background: var(--red-light); box-shadow: none; }
            50%      { background: var(--red-active); box-shadow: 0 0 10px var(--red-active); }
        }

        /* Vote button */
        .vote-btn {
            background: #0a2d6e;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }
        .vote-btn:hover  { background: #071d4a; }
        .vote-btn:active { transform: scale(.96); }

        /* Empty candidate rows */
        .empty-row td.col-info { min-height: 52px; }

        /* ── Share button ── */
        .evm-footer {
            padding: 18px 24px;
            background: #f8f9fb;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .share-btn {
            background: var(--teal);
            color: #fff;
            border: none;
            border-radius: 30px;
            padding: 13px 36px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: .5px;
            transition: background .2s;
        }
        .share-btn:hover { background: #0f7a72; }

        /* ── Confirmation page ── */
        .confirmation-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f2f5;
        }
        .vvpat-machine {
            position: relative;
            width: 280px;
        }
        .vvpat-slip {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 1px solid #bbb;
            padding: 10px 14px;
            font-size: .75rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.5;
            animation: slipDrop 1s ease-out forwards;
        }
        @keyframes slipDrop {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* ── Success page ── */
        .success-wrap {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .success-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--evm-blue);
            margin-bottom: 6px;
        }
        .success-subtitle {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--purple);
            margin-bottom: 28px;
        }
        .voted-card {
            background: #fff;
            border-radius: 16px;
            border: 2px solid var(--purple);
            padding: 28px 20px 24px;
            box-shadow: 0 4px 24px rgba(124,58,237,.12);
            margin-bottom: 10px;
        }
        .voted-card img.cand-photo {
            width: 130px; height: 130px;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .voted-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--success);
            color: #fff;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: .9rem;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .voted-name {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 12px;
        }
        .vote-again-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 2px solid var(--success);
            color: var(--success);
            border-radius: 30px;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s, color .2s;
        }
        .vote-again-btn:hover { background: var(--success); color: #fff; }

        @keyframes votedPop {
            0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            70%  { transform: scale(1.15) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .voted-badge svg polyline {
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: tickDraw 0.4s ease 0.4s forwards;
        }

        @keyframes tickDraw {
            to { stroke-dashoffset: 0; }
        }

        /* Compact empty rows */
        .compact-row td {
            padding: 6px 10px;
        }
        .compact-row .led {
            width: 14px; height: 14px;
        }
        .compact-row .vote-btn {
            padding: 10px 24px;   
        }
        .compact-row .col-num {
            font-size: .85rem;
        }

        /* VVPAT scrolling text */
.vvpat-screen {
    position: absolute;
    top: 17%;
    left: 45%;
    transform: translateX(-50%);
    width: 68px;
    height: 65px;
    overflow: hidden;
    background: #fff;
    border: 1px solid #bbb;
   
}

.vvpat-ticker {
    display: block;
    font-size: .62rem;
    font-weight: 700;
    line-height: 1.4;
    text-align: center;
    white-space: normal;
    word-break: break-word;
    animation: tickerScrollV 4s linear infinite;
}

@keyframes tickerScrollV {
    0%   { transform: translateY(28px); }   /* start: below visible area */
    100% { transform: translateY(-100%); }  /* end: fully scrolled above */
}
    </style>
</head>
<body>

<audio id="voteSound" src="sounds/keee.mpeg" preload="auto"></audio>

<!-- ══════════════════════════════════
     PAGE 1: BALLOT
══════════════════════════════════ -->
<div id="page-ballot" class="page active" style="width:100%;flex-direction:column;align-items:center;padding:6px;">
    <div class="evm-wrapper">
        <div class="evm-header">EVM DEMO</div>
        <div class="evm-machine">

            <!-- Status bar -->
            <div class="evm-status">
                <span class="status-label">
                    Ready
                    <span class="status-dot ready" id="statusDot"></span>
                </span>
                <span class="ballot-unit">Ballot Unit &nbsp; 1</span>
            </div>

            <!-- Ballot rows -->
            <table class="ballot-list">
                <tbody>
                    <!-- Empty rows 1–6 -->
                    <tr class="empty-row compact-row">
                        <td class="col-num">1</td><td class="col-info"></td>
                        <td class="col-photo"></td><td class="col-symbol"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled style="opacity:.5;cursor:not-allowed">&nbsp;&nbsp;&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">2</td><td class="col-info"></td>
                        <td class="col-photo"></td><td class="col-symbol"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled style="opacity:.5;cursor:not-allowed">&nbsp;&nbsp;&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">3</td><td class="col-info"></td>
                        <td class="col-photo"></td><td class="col-symbol"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled style="opacity:.5;cursor:not-allowed">&nbsp;&nbsp;&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">4</td><td class="col-info"></td>
                        <td class="col-photo"></td><td class="col-symbol"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled style="opacity:.5;cursor:not-allowed">&nbsp;&nbsp;&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">5</td><td class="col-info"></td>
                        <td class="col-photo"></td><td class="col-symbol"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled style="opacity:.5;cursor:not-allowed">&nbsp;&nbsp;&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">6</td><td class="col-info"></td>
                        <td class="col-photo"></td><td class="col-symbol"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled style="opacity:.5;cursor:not-allowed">&nbsp;&nbsp;&nbsp;</button></td>
                    </tr>

                    <!-- Candidate row 7 -->
                    <tr id="row-1">
                        <td class="col-num">7</td>
                        <td class="col-info">
                            <div class="candidate-name">ടി.കെ. ഗോവിന്ദൻ മാസ്റ്റർ</div>
                            <div style="font-size:.75rem;color:#666;margin-top:3px;">S/o കുഞ്ഞിക്കണ്ണൻ നമ്പ്യാർ</div>
                        </td>
                        <td class="col-photo">
                            <div class="photo-avatar" style="width:75px;height:75px;">
                                <img src="images/govidan1.png" alt="Candidate Photo">
                            </div>
                        </td>
                        <td class="col-symbol">
                            <img src="images/gas.jpeg" style="width:60px;height:60px;object-fit:contain;">
                        </td>
                        <td class="col-led">
                            <div class="led" id="led-1"></div>
                        </td>
                        <td class="col-btn">
                            <button class="vote-btn" id="voteBtn" onclick="castVote()">
                                &nbsp;&nbsp;&nbsp;
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- Footer -->
            <div class="evm-footer">
                <button class="share-btn" onclick="shareLink()">📤 &nbsp;Share Demo Voting Machine</button>
            </div>
        </div>
    </div>
</div>


<!-- ══════════════════════════════════
     PAGE 2: CONFIRMATION (VVPAT)
══════════════════════════════════ -->
<div id="page-confirmation" class="page confirmation-wrap">
    <div class="vvpat-machine" style="position:relative;width:280px;">
        <img src="images/vvpat-removebg.png" alt="VVPAT"
             style="width:280px;height:auto;display:block;">
        <div class="vvpat-screen">
            <div class="vvpat-ticker">ടി.കെ. ഗോവിന്ദൻ മാസ്റ്റർ</div>
        </div>
    </div>
</div>


<!-- ══════════════════════════════════
     PAGE 3: SUCCESS
══════════════════════════════════ -->
<div id="page-success" class="page success-wrap">
    <div class="success-title">ബാലറ്റിൽ ഏഴാമത്,</div>
    <div class="success-subtitle">ജനമനസ്സുകളിൽ ഒന്നാമത്</div>

    <div class="voted-card" style="position:relative;">
        <div style="display:flex;justify-content:center;margin-bottom:12px;">
            <img src="images/govidan.jpeg"
                 style="width:270px;height:auto;border-radius:8px;object-fit:cover;">
        </div>

        <div class="voted-badge"
             style="position:absolute;top:14px;right:14px;margin-bottom:0;
                    animation:votedPop 0.6s cubic-bezier(.36,1.56,.64,1) both;">
            <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="3"
                 viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            VOTED
        </div>

        <div style="display:flex;justify-content:center;">
            <div style="width:56px;height:56px;border-radius:50%;background:#f1f5f9;
                        display:flex;align-items:center;justify-content:center;overflow:hidden;">
                <img src="images/gas.jpeg" style="width:60px;height:60px;object-fit:contain;">
            </div>
        </div>
    </div>

    <button class="vote-again-btn" onclick="resetVote()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5"
             viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4"/>
        </svg>
        VOTE AGAIN
    </button>
</div>


<script>
    // ── Page navigation ──────────────────────────
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }

    // ── Cast vote ────────────────────────────────
    function castVote() {
        const btn = document.getElementById('voteBtn');
        const led = document.getElementById('led-1');
        const dot = document.getElementById('statusDot');
        const sound = document.getElementById('voteSound');

        if (sound) { sound.currentTime = 0; sound.play().catch(() => {}); }

        btn.disabled = true;
        btn.style.opacity = '.6';

        dot.classList.remove('ready');
        dot.style.background = 'var(--red-active)';
        dot.style.boxShadow = '0 0 12px var(--red-active)';

        led.style.background = 'var(--red-active)';
        led.style.boxShadow = '0 0 10px var(--red-active)';

        // Go to VVPAT confirmation after 1.7s
        setTimeout(() => {
            showPage('page-confirmation');
            // Auto-advance to success after 2.2s
            setTimeout(() => {
                showPage('page-success');
            }, 2200);
        }, 1700);
    }

    // ── Reset (Vote Again) ───────────────────────
    function resetVote() {
        // Reset button and LED state
        const btn = document.getElementById('voteBtn');
        const led = document.getElementById('led-1');
        const dot = document.getElementById('statusDot');

        btn.disabled = false;
        btn.style.opacity = '1';
        led.style.background = '';
        led.style.boxShadow = '';
        dot.classList.add('ready');
        dot.style.background = '';
        dot.style.boxShadow = '';

        showPage('page-ballot');
    }

    // ── Share ────────────────────────────────────
    function shareLink() {
        if (navigator.share) {
            navigator.share({
                title: 'EVM DEMO',
                text: 'ടി.കെ. ഗോവിന്ദൻ മാസ്റ്റർ,\nബാലറ്റിൽ ഏഴാമത്, ജനമനസ്സുകളിൽ ഒന്നാമത്\nനിങ്ങളുടെ ഓരോ വിലയേറിയ വോട്ടും നമ്മുടെ സ്ഥാനാർത്ഥിക്ക്,\nഅവരുടെ ഡെമോ വോട്ടിംഗ് മെഷീനിൽ വോട്ട് ചെയ്യാനായി ക്ലിക്ക് ചെയ്യൂ 👇\n',
                url: window.location.href
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href)
                .then(() => alert('Link copied to clipboard!'))
                .catch(() => alert(window.location.href));
        }
    }
</script>

</body>
</html>
