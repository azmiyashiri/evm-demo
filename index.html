<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVM DEMO</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --evm-blue:   #1a4b8c;
            --evm-blue2:  #2563a8;
            --btn-blue:   #1e5799;
            --red-light:  #c0392b;
            --red-active: #ff2222;
            --bg:         #f0f2f5;
            --card-bg:    #ffffff;
            --border:     #d0d4da;
            --text:       #1a1a2e;
            --teal:       #0d9488;
            --success:    #16a34a;
            --purple:     #7c3aed;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 12px;
        }

        .evm-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .evm-machine {
            background: var(--card-bg);
            border-radius: 18px;
            box-shadow: 0 8px 40px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.08);
            width: 100%;
            overflow: hidden;
        }

        .evm-header {
            color: var(--text);
            text-align: center;
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 10px 0 6px;
        }

        .evm-status {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            background: #f8f9fb;
        }
        .evm-status .status-label {
            font-weight: 600; font-size: .9rem;
            display: flex; align-items: center; gap: 6px;
        }
        .status-dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--red-light);
            transition: background .3s, box-shadow .3s;
        }
        .status-dot.ready { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
        .ballot-unit { font-weight: 600; font-size: .9rem; }

        /* ── Ballot table ── */
        .ballot-list { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .ballot-list tr { border-bottom: 1px solid var(--border); }
        .ballot-list tr:last-child { border-bottom: none; }
        .ballot-list td { vertical-align: middle; }

        .col-num    { width: 34px; text-align: center; color: #555; font-weight: 700; }
        .col-symbol { width: 52px; }
        .col-photo  { width: 52px; }
        .col-led    { width: 28px; text-align: center; }
        .col-btn    { width: 74px; text-align: right; padding-right: 10px; }

        .candidate-name { font-weight: 600; color: var(--text); line-height: 1.4; }

        .photo-avatar {
            border-radius: 4px; background: transparent;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .photo-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .led {
            border-radius: 50%; background: var(--red-light);
            border: 2px solid #8b1a1a; margin: 0 auto;
            transition: background .3s, box-shadow .3s;
        }
        @keyframes ledBlink {
            0%,100% { background: var(--red-light); box-shadow: none; }
            50%      { background: var(--red-active); box-shadow: 0 0 10px var(--red-active); }
        }

        .vote-btn {
            background: #0a2d6e; color: #fff; border: none;
            border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap; width: 100%;
        }
        .vote-btn:hover  { background: #071d4a; }
        .vote-btn:active { transform: scale(.96); }

        /* ── Empty rows 1-6: tiny ── */
        .compact-row td        { padding: 4px 5px; }
        .compact-row .col-num  { font-size: .78rem; }
        .compact-row .led      { width: 10px; height: 10px; border-width: 1px; }
        .compact-row .vote-btn { padding: 6px 8px; font-size: .62rem; border-radius: 5px; opacity: .5; cursor: not-allowed; }

        /* ── Candidate row 7: BIG ── */
        #row-1 td              { padding: 12px 6px; }
        #row-1 .col-num        { font-size: 1.5rem; }
        #row-1 .candidate-name { font-size: 1.1rem; font-weight: 700; }
        #row-1 .photo-avatar   { width: 88px; height: 88px; }
        #row-1 .col-symbol img { width: 78px !important; height: 78px !important; }
        #row-1 .led            { width: 20px; height: 20px; }
        #row-1 .vote-btn       { padding: 14px 10px; font-size: .9rem; border-radius: 10px; }

        /* ── Footer ── */
        .evm-footer {
            padding: 12px 16px; background: #f8f9fb;
            border-top: 1px solid var(--border); text-align: center;
        }
        .share-btn {
            background: var(--teal); color: #fff; border: none;
            border-radius: 30px; padding: 11px 28px;
            font-size: .95rem; font-weight: 700; cursor: pointer;
            letter-spacing: .5px; transition: background .2s; width: 100%;
        }
        .share-btn:hover { background: #0f7a72; }

        /* ── Confirmation / Success pages ── */
        .confirmation-wrap {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; background: #f0f2f5;
        }
        .success-wrap {
            text-align: center; max-width: 400px; width: 100%; padding: 12px;
        }
        .success-title    { font-size: 1.3rem; font-weight: 800; color: var(--evm-blue); margin-bottom: 4px; }
        .success-subtitle { font-size: 1.1rem; font-weight: 700; color: var(--purple); margin-bottom: 20px; }
        .voted-card {
            background: #fff; border-radius: 16px; border: 2px solid var(--purple);
            padding: 20px 16px 18px; box-shadow: 0 4px 24px rgba(124,58,237,.12); margin-bottom: 10px;
        }
        .voted-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--success); color: #fff;
            border-radius: 20px; padding: 5px 14px; font-size: .85rem; font-weight: 700;
        }
        .vote-again-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #fff; border: 2px solid var(--success); color: var(--success);
            border-radius: 30px; padding: 11px 28px; font-size: .95rem; font-weight: 700;
            cursor: pointer; text-decoration: none;
            transition: background .2s, color .2s; margin-top: 4px;
        }
        .vote-again-btn:hover { background: var(--success); color: #fff; }
        @keyframes votedPop {
            0%   { opacity: 0; transform: scale(0.3) rotate(-10deg); }
            70%  { transform: scale(1.15) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }
        .voted-badge svg polyline {
            stroke-dasharray: 30; stroke-dashoffset: 30;
            animation: tickDraw 0.4s ease 0.4s forwards;
        }
        @keyframes tickDraw { to { stroke-dashoffset: 0; } }

        /* ── VVPAT ── */
        .vvpat-screen {
            position: absolute; top: 17%; left: 45%;
            transform: translateX(-50%);
            width: 68px; height: 65px;
            overflow: hidden; background: #fff; border: 1px solid #bbb;
        }
        .vvpat-ticker {
            display: flex; flex-direction: column; align-items: center;
            font-size: .62rem; font-weight: 700; line-height: 1.4;
            text-align: center; white-space: normal; word-break: break-word;
            animation: tickerScrollV 4s linear infinite;
        }
        @keyframes tickerScrollV {
            0%   { transform: translateY(28px); }
            100% { transform: translateY(-100%); }
        }

        /* ══ MOBILE ══ */
        @media (max-width: 480px) {
            body {
                height: 100dvh; padding: 6px;
                align-items: flex-start; overflow: hidden;
            }
            .evm-wrapper {
                height: calc(100dvh - 12px);
                gap: 4px; justify-content: flex-start; width: 100%;
            }
            .evm-header {
                font-size: 1.05rem; letter-spacing: 2px;
                padding: 5px 0 3px; flex-shrink: 0; width: 100%; text-align: center;
            }
            .evm-machine {
                flex: 1 1 auto; display: flex; flex-direction: column;
                border-radius: 14px; width: 100%; overflow: hidden; min-height: 0;
            }
            .evm-status { padding: 6px 12px; flex-shrink: 0; }
            .evm-status .status-label { font-size: .8rem; gap: 5px; font-weight: 700; }
            .ballot-unit { font-size: .8rem; font-weight: 700; }
            .status-dot  { width: 10px; height: 10px; }

            .ballot-list {
                flex: 1 1 auto; display: table; width: 100%;
                min-height: 0; table-layout: fixed; border-collapse: collapse;
            }
            .ballot-list tbody { display: table-row-group; }
            .ballot-list tr    { display: table-row; height: auto; }
            .ballot-list td    { display: table-cell; vertical-align: middle; }

            /* column widths */
            .col-num    { width: 26px; text-align: center; padding-left: 4px !important; }
            .col-symbol { width: 40px; }
            .col-photo  { width: 40px; }
            .col-led    { width: 20px; text-align: center; }
            .col-btn    { width: 56px; text-align: right; padding-right: 5px !important; }

            /* ── empty rows: bare minimum ── */
            .compact-row td        { padding: 2px 3px; }
            .compact-row .col-num  { font-size: .6rem; }
            .compact-row .led      { width: 7px; height: 7px; border-width: 1px; }
            .compact-row .vote-btn { padding: 4px 4px; font-size: .5rem; border-radius: 4px; width: 100%; }

            /* ── row 7: prominent ── */
            #row-1 td              { padding: 7px 3px; }
            #row-1 .col-num        { font-size: 1.2rem; }
            #row-1 .candidate-name { font-size: .95rem; font-weight: 700; line-height: 1.3; }
            #row-1 td.col-info div:not(.candidate-name) { font-size: .68rem !important; color: #666; margin-top: 2px; }
            #row-1 .photo-avatar   { width: 60px !important; height: 60px !important; border-radius: 5px; }
            #row-1 .col-symbol img { width: 52px !important; height: 52px !important; }
            #row-1 .led            { width: 16px; height: 16px; }
            #row-1 .vote-btn       { padding: 11px 5px; font-size: .78rem; font-weight: 700; border-radius: 8px; width: 100%; }

            /* footer */
            .evm-footer { padding: 7px 10px; flex-shrink: 0; }
            .share-btn  { font-size: .78rem; padding: 9px 12px; border-radius: 20px; }
        }

        /* extra-small (<=360px) */
        @media (max-width: 360px) {
            .evm-header            { font-size: .88rem; letter-spacing: 1.5px; }
            .col-num               { width: 22px; }
            .col-btn               { width: 48px; }
            .compact-row .vote-btn { font-size: .45rem; padding: 3px 3px; }
            .share-btn             { font-size: .7rem; }
            #row-1 .candidate-name { font-size: .85rem; }
            #row-1 .photo-avatar   { width: 50px !important; height: 50px !important; }
            #row-1 .col-symbol img { width: 44px !important; height: 44px !important; }
            #row-1 .vote-btn       { padding: 10px 4px; font-size: .7rem; }
        }

        /* page visibility */
        .page { display: none; }
        .page.active { display: flex; width: 100%; height: 100dvh; }
        .confirmation-wrap {
            width: 100%; min-height: 100vh; flex-direction: column;
            align-items: center; justify-content: center; background: #f0f2f5;
        }
        .success-wrap {
            width: 100%; min-height: 100vh; flex-direction: column;
            align-items: center; justify-content: flex-start;
            background: #f0f2f5; padding: 12px; padding-top: 50px;
        }
    </style>
</head>
<body>

<audio id="voteSound" src="sounds/keee.mpeg" preload="auto"></audio>

<!-- PAGE 1: BALLOT -->
<div id="page-ballot" class="page active" style="width:100%;flex-direction:column;align-items:center;padding:6px;">
    <div class="evm-wrapper">
        <div class="evm-header">EVM DEMO</div>
        <div class="evm-machine">
            <div class="evm-status">
                <span class="status-label">
                    Ready
                    <span class="status-dot ready" id="statusDot"></span>
                </span>
                <span class="ballot-unit">Ballot Unit &nbsp; 1</span>
            </div>

            <table class="ballot-list">
                <tbody>
                    <tr class="empty-row compact-row">
                        <td class="col-num">1</td><td class="col-info"></td>
                        <td class="col-symbol"></td><td class="col-photo"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled>&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">2</td><td class="col-info"></td>
                        <td class="col-symbol"></td><td class="col-photo"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled>&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">3</td><td class="col-info"></td>
                        <td class="col-symbol"></td><td class="col-photo"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled>&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">4</td><td class="col-info"></td>
                        <td class="col-symbol"></td><td class="col-photo"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled>&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">5</td><td class="col-info"></td>
                        <td class="col-symbol"></td><td class="col-photo"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled>&nbsp;</button></td>
                    </tr>
                    <tr class="empty-row compact-row">
                        <td class="col-num">6</td><td class="col-info"></td>
                        <td class="col-symbol"></td><td class="col-photo"></td>
                        <td class="col-led"><div class="led"></div></td>
                        <td class="col-btn"><button class="vote-btn" disabled>&nbsp;</button></td>
                    </tr>

                    <!-- Candidate row 7 -->
                    <tr id="row-1">
                        <td class="col-num">7</td>
                        <td class="col-info">
                            <div class="candidate-name">ടി.കെ. ഗോവിന്ദൻ മാസ്റ്റർ</div>
                            <div style="font-size:.75rem;color:#666;margin-top:3px;">S/o കുഞ്ഞിക്കണ്ണൻ നമ്പ്യാർ</div>
                        </td>
                        <td class="col-symbol">
                            <img src="images/gas.jpeg" style="width:78px;height:78px;object-fit:contain;">
                        </td>
                        <td class="col-photo">
                            <div class="photo-avatar" style="width:88px;height:88px;">
                                <img src="images/govidan1.png" alt="Candidate Photo">
                            </div>
                        </td>
                        <td class="col-led">
                            <div class="led" id="led-1" style="width:20px;height:20px;"></div>
                        </td>
                        <td class="col-btn">
                            <button class="vote-btn" id="voteBtn" onclick="castVote()"
                                    style="padding:14px 10px;font-size:.9rem;border-radius:10px;">
                                &nbsp;&nbsp;&nbsp;
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="evm-footer">
                <button class="share-btn" onclick="shareLink()">📤 &nbsp;Share Demo Voting Machine</button>
            </div>
        </div>
    </div>
</div>

<!-- PAGE 2: VVPAT -->
<div id="page-confirmation" class="page confirmation-wrap">
    <div class="vvpat-machine" style="position:relative;width:280px;">
        <img src="images/vvpat-removebg.png" alt="VVPAT" style="width:280px;height:auto;display:block;">
        <div class="vvpat-screen">
            <div class="vvpat-ticker">
                ടി.കെ. ഗോവിന്ദൻ മാസ്റ്റർ<br>
                <img src="images/gas.jpeg" style="width:40px;height:40px;object-fit:contain;margin-top:4px;">
            </div>
        </div>
    </div>
</div>

<!-- PAGE 3: SUCCESS -->
<div id="page-success" class="page success-wrap">
    <div class="success-title">ബാലറ്റിൽ ഏഴാമത്,</div>
    <div class="success-subtitle">ജനമനസ്സുകളിൽ ഒന്നാമത്</div>

    <div class="voted-card" style="position:relative;">
        <div style="display:flex;justify-content:center;margin-bottom:12px;">
            <img src="images/govidan.jpeg" style="width:270px;height:auto;border-radius:8px;object-fit:cover;">
        </div>
        <div class="voted-badge"
             style="position:absolute;top:14px;right:14px;
                    animation:votedPop 0.6s cubic-bezier(.36,1.56,.64,1) both;">
            <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="3"
                 viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            VOTED
        </div>
        <div style="display:flex;justify-content:center;">
            <div style="width:56px;height:56px;border-radius:50%;background:#f1f5f9;
                        display:flex;align-items:center;justify-content:center;overflow:hidden;">
                <img src="images/gas.jpeg" style="width:60px;height:60px;object-fit:contain;">
            </div>
        </div>
    </div>

    <button class="vote-again-btn" onclick="resetVote()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4"/>
        </svg>
        VOTE AGAIN
    </button>
</div>

<script>
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0, 0);
    }

    function castVote() {
        const btn   = document.getElementById('voteBtn');
        const led   = document.getElementById('led-1');
        const dot   = document.getElementById('statusDot');
        const sound = document.getElementById('voteSound');

        if (sound) { sound.currentTime = 0; sound.play().catch(() => {}); }
        btn.disabled = true;
        btn.style.opacity = '.6';
        dot.classList.remove('ready');
        dot.style.background = 'var(--red-active)';
        dot.style.boxShadow  = '0 0 12px var(--red-active)';
        led.style.background = 'var(--red-active)';
        led.style.boxShadow  = '0 0 10px var(--red-active)';

        setTimeout(() => {
            showPage('page-confirmation');
            setTimeout(() => showPage('page-success'), 2200);
        }, 1700);
    }

    function resetVote() {
        const btn = document.getElementById('voteBtn');
        const led = document.getElementById('led-1');
        const dot = document.getElementById('statusDot');

        btn.disabled = false;
        btn.style.opacity = '1';
        led.style.background = '';
        led.style.boxShadow  = '';
        dot.classList.add('ready');
        dot.style.background = '';
        dot.style.boxShadow  = '';
        showPage('page-ballot');
    }

    function shareLink() {
        if (navigator.share) {
            navigator.share({
                title: 'EVM DEMO',
                text: 'ടി.കെ. ഗോവിന്ദൻ മാസ്റ്റർ,\nബാലറ്റിൽ ഏഴാമത്, ജനമനസ്സുകളിൽ ഒന്നാമത്\nനിങ്ങളുടെ ഓരോ വിലയേറിയ വോട്ടും നമ്മുടെ സ്ഥാനാർത്ഥിക്ക്,\nഅവരുടെ ഡെമോ വോട്ടിംഗ് മെഷീനിൽ വോട്ട് ചെയ്യാനായി ക്ലിക്ക് ചെയ്യൂ 👇\n',
                url: window.location.href
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href)
                .then(() => alert('Link copied to clipboard!'))
                .catch(() => alert(window.location.href));
        }
    }
</script>

</body>
</html>
